<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claim Your Home — Zillow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #ADB5BD; color: #343A40; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    a { color: #000000; }

    .modal { background: #ffffff; border: 1px solid #C8CDD3; border-radius: 6px; width: 100%; max-width: 520px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }

    .modal-title { font-size: 22px; font-weight: 800; color: #000000; margin-bottom: 16px; }
    .modal-body { font-size: 15px; color: #343A40; line-height: 1.6; margin-bottom: 28px; }

    /* Progress indicator */
    .progress { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; font-size: 13px; }
    .progress-step { font-weight: 700; color: #000000; }
    .progress-step.inactive { color: #ADB5BD; font-weight: 400; }
    .progress-arrow { color: #ADB5BD; }

    .btn { display: block; width: 100%; background: #212529; color: #ffffff; font-size: 15px; font-weight: 700; padding: 14px 20px; border-radius: 4px; text-decoration: none; text-align: center; border: none; cursor: pointer; font-family: inherit; margin-bottom: 14px; }
    .btn:hover { background: #343A40; }

    .link-secondary { display: block; text-align: center; font-size: 14px; color: #ADB5BD; text-decoration: none; }
    .link-secondary:hover { color: #343A40; text-decoration: underline; }

    .modal-address { font-size: 13px; color: #ADB5BD; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div class="modal">
    <div class="modal-address">4821 Maple Ave, Seattle, WA 98103</div>
    <h1 class="modal-title">Claim 4821 Maple Ave</h1>

    <!-- Progress indicator -->
    <div class="progress">
      <span class="progress-step">Step 1 of 2 &mdash; Claim</span>
      <span class="progress-arrow">&rarr;</span>
      <span class="progress-step inactive">Step 2 &mdash; Verify ownership</span>
    </div>

    <p class="modal-body">Claiming this home lets you edit your home's details, see homeowner-only insights, and track your home's value over time.</p>

    <a href="verify-modal.html" class="btn">Continue to verify ownership</a>
    <a href="nfshdp-preclaim.html" class="link-secondary">Cancel</a>
  </div>

</body>
</html>
