<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verify Ownership — Zillow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #ADB5BD; color: #343A40; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    a { color: #000000; }

    .modal { background: #ffffff; border: 1px solid #C8CDD3; border-radius: 6px; width: 100%; max-width: 520px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }

    .modal-address { font-size: 13px; color: #ADB5BD; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .modal-title { font-size: 22px; font-weight: 800; color: #000000; margin-bottom: 16px; }
    .modal-body { font-size: 15px; color: #343A40; line-height: 1.6; margin-bottom: 28px; }

    /* Progress indicator */
    .progress { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; font-size: 13px; }
    .progress-step { font-weight: 700; color: #000000; }
    .progress-step.done { color: #ADB5BD; font-weight: 400; }
    .progress-arrow { color: #ADB5BD; }

    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 700; color: #000000; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 14px; border: 1.5px solid #DEE2E6; border-radius: 4px; font-size: 15px; font-family: inherit; color: #343A40; outline: none; }
    .form-input:focus { border-color: #000000; }
    .form-input::placeholder { color: #ADB5BD; }

    .btn { display: block; width: 100%; background: #212529; color: #ffffff; font-size: 15px; font-weight: 700; padding: 14px 20px; border-radius: 4px; text-decoration: none; text-align: center; border: none; cursor: pointer; font-family: inherit; margin-bottom: 14px; }
    .btn:hover { background: #343A40; }

    .link-secondary { display: block; text-align: center; font-size: 14px; color: #ADB5BD; text-decoration: none; margin-bottom: 16px; }
    .link-secondary:hover { color: #343A40; text-decoration: underline; }

    .support-note { text-align: center; font-size: 12px; color: #ADB5BD; }
    .support-note a { color: #ADB5BD; }
  </style>
</head>
<body>

  <div class="modal">
    <div class="modal-address">4821 Maple Ave, Seattle, WA 98103</div>
    <h1 class="modal-title">Verify you own this home</h1>

    <!-- Progress indicator -->
    <div class="progress">
      <span class="progress-step done">&#10003; Step 1 of 2 &mdash; Claim</span>
      <span class="progress-arrow">&rarr;</span>
      <span class="progress-step">Step 2 &mdash; Verify ownership</span>
    </div>

    <p class="modal-body">We'll send a verification code to the address on file. This confirms you're the homeowner.</p>

    <div class="form-group">
      <label class="form-label">Verification code</label>
      <input class="form-input" type="text" placeholder="Enter your verification code">
    </div>

    <a href="nfshdp-postclaim.html" class="btn">Verify ownership</a>
    <a href="claim-modal.html" class="link-secondary">&#8592; Back</a>

    <p class="support-note">Having trouble? <a href="#">Contact support.</a></p>
  </div>

</body>
</html>
